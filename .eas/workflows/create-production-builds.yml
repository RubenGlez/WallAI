name: Production Build and Submit

on:
  push:
    branches:
      - main

jobs:
  build_android:
    type: build
    params:
      platform: android
      profile: production

  submit_android:
    type: submit
    needs: [build_android]
    params:
      platform: android
      profile: internal

  ota_update:
    type: update
    needs: [build_android]
    params:
      channel: production
      message: "Production release from main"
